name: Build Webpage + PDF

on: [push, pull_request]

jobs:
  build_book:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        book: [
          GEN, EXO, LEV, NUM, DEU, JOS, JDG, RUT,
          1SA, 2SA, 1KI, 2KI, 1CH, 2CH, EZR, NEH,
          EST, JOB, PSA, PRO, ECC, SNG, ISA, JER,
          LAM, EZK, DAN, HOS, JOL, AMO, OBA, JON,
          MIC, NAM, HAB, ZEP, HAG, ZEC, MAL,
          MAT, MRK, LUK, JHN, ACT, ROM, 1CO, 2CO,
          GAL, EPH, PHP, COL, 1TH, 2TH, 1TI, 2TI,
          TIT, PHM, HEB, JAS, 1PE, 2PE, 1JN, 2JN,
          3JN, JUD, REV
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile ${{ matrix.book }}
        uses: xu-cheng/latex-action@v3
        with:
          root_file: compile/${{ matrix.book }}.tex
          working_directory: .
          latexmk_use_xelatex: true
          post_compile: "latexmk -c"

      - name: Upload ${{ matrix.book }} PDF
        uses: actions/upload-artifact@v4
        with:
          name: book-${{ matrix.book }}
          path: compile/${{ matrix.book }}.pdf

  merge_pdf:
    runs-on: ubuntu-latest
    needs: build_book

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all book PDFs
        uses: actions/download-artifact@v4
        with:
          pattern: book-*
          path: pdfs
          merge-multiple: true

      - name: Merge PDFs in canonical order
        run: |
          sudo apt-get install -y poppler-utils
          ls pdfs/compile/ || { echo "ERROR: pdfs/compile/ missing"; ls pdfs/ ; exit 1; }
          pdfunite \
            pdfs/compile/GEN.pdf pdfs/compile/EXO.pdf pdfs/compile/LEV.pdf pdfs/compile/NUM.pdf pdfs/compile/DEU.pdf \
            pdfs/compile/JOS.pdf pdfs/compile/JDG.pdf pdfs/compile/RUT.pdf \
            pdfs/compile/1SA.pdf pdfs/compile/2SA.pdf pdfs/compile/1KI.pdf pdfs/compile/2KI.pdf \
            pdfs/compile/1CH.pdf pdfs/compile/2CH.pdf pdfs/compile/EZR.pdf pdfs/compile/NEH.pdf \
            pdfs/compile/EST.pdf pdfs/compile/JOB.pdf pdfs/compile/PSA.pdf pdfs/compile/PRO.pdf \
            pdfs/compile/ECC.pdf pdfs/compile/SNG.pdf pdfs/compile/ISA.pdf pdfs/compile/JER.pdf \
            pdfs/compile/LAM.pdf pdfs/compile/EZK.pdf pdfs/compile/DAN.pdf pdfs/compile/HOS.pdf \
            pdfs/compile/JOL.pdf pdfs/compile/AMO.pdf pdfs/compile/OBA.pdf pdfs/compile/JON.pdf \
            pdfs/compile/MIC.pdf pdfs/compile/NAM.pdf pdfs/compile/HAB.pdf pdfs/compile/ZEP.pdf \
            pdfs/compile/HAG.pdf pdfs/compile/ZEC.pdf pdfs/compile/MAL.pdf \
            pdfs/compile/MAT.pdf pdfs/compile/MRK.pdf pdfs/compile/LUK.pdf pdfs/compile/JHN.pdf \
            pdfs/compile/ACT.pdf pdfs/compile/ROM.pdf pdfs/compile/1CO.pdf pdfs/compile/2CO.pdf \
            pdfs/compile/GAL.pdf pdfs/compile/EPH.pdf pdfs/compile/PHP.pdf pdfs/compile/COL.pdf \
            pdfs/compile/1TH.pdf pdfs/compile/2TH.pdf pdfs/compile/1TI.pdf pdfs/compile/2TI.pdf \
            pdfs/compile/TIT.pdf pdfs/compile/PHM.pdf pdfs/compile/HEB.pdf pdfs/compile/JAS.pdf \
            pdfs/compile/1PE.pdf pdfs/compile/2PE.pdf pdfs/compile/1JN.pdf pdfs/compile/2JN.pdf \
            pdfs/compile/3JN.pdf pdfs/compile/JUD.pdf pdfs/compile/REV.pdf \
            srb-bibeln.pdf

      - name: Upload merged Bible PDF
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: srb-bibeln.pdf

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p output
          cp srb-bibeln.pdf output/srb-bibeln.pdf
          cp index.html output/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
